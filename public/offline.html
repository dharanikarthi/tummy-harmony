<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GutSense - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f0fdf9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: white; border-radius: 24px; padding: 48px 32px; text-align: center; max-width: 360px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { color: #0d9488; font-size: 24px; margin-bottom: 12px; }
    p { color: #6b7280; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .tip { background: #f0fdf9; border: 1px solid #99f6e4; border-radius: 16px; padding: 16px; font-size: 13px; color: #0d9488; margin-bottom: 24px; }
    button { background: #0d9488; color: white; border: none; padding: 14px 32px; border-radius: 16px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
    button:hover { background: #0f766e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌿</div>
    <h1>You're Offline</h1>
    <p>GutSense needs an internet connection to analyze foods with AI. But your profile and history are still available!</p>
    <div class="tip">💡 Your saved food history and gut tips are available offline</div>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
